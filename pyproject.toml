[project]
name = "cli-tools"
version = "0.1.0"
requires-python = ">=3.13"

[tool.uv.workspace]
members = ["kv", "oauth", "notion"]

[tool.uv.sources]

[dependency-groups]
dev = [
    "ruff>=0.8.0",
    "black>=24.0.0",
    "mypy>=1.13.0",
    "pytest>=8.0.0",
    "types-pyyaml>=6.0.0",
]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.black]
line-length = 100
target-version = ["py313"]

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_configs = true
